---
- name: Create User
  ansible.builtin.user:
    name: "{{ item.username }}"
    comment: "{{ item.firstname }} {{ item.lastname }}"
    shell: /bin/bash
  # Loop over all users
  loop: "{{ users_present }}"
  loop_control:
    label: "{{ item.username }}"
  when: inventory_hostname in item.hosts|default([]) or
        item.on_all_hosts|default(false)

- name: Set SSH Authorized Keys
  ansible.posix.authorized_key:
    user: "{{ item.username }}"
    state: present
    key: "{{ lookup('file', './files/ssh-pub-keys/'+item.username+'.pub') }}"
  when: inventory_hostname in item.hosts|default([]) or
        item.on_all_hosts|default(false)
  loop: "{{ users_present }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create Sudo Rule
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ item.username|replace('.','_') }}
    mode: "0440"
    content: |
      # This file is managed by Ansible. Do not edit!
      {{ item.username }} ALL=(ALL) NOPASSWD:ALL
  when: inventory_hostname in item.hosts|default([]) or
        item.on_all_hosts|default(false)
  loop: "{{ users_present }}"
  loop_control:
    label: "{{ item.username }}"

- name: Delete users
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: true
  # Loop over all users
  loop: "{{ users_absent }}"
  loop_control:
    label: "{{ item }}"
